name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TEST_THREADS: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  CARGO_HACK_DENY_WARNINGS: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuxo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
    permissions:
      security-events: write # for github/codeql-action/*
  miri:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-miri.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
  msrv:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-msrv.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
  release-dry-run:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-release-dry-run.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main

  test:
    needs: tidy
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
          - rust: beta
          - rust: nightly
          - rust: nightly
            os: macos-latest
          - rust: nightly
            os: windows-latest
    runs-on: ${{ matrix.os || 'ubuntu-24.04' }}
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2.77.4
        with:
          tool: rust@${{ matrix.rust }}
          fallback: none
      - run: cargo test --workspace --all-features
      - run: |
          cargo install --path . --debug
          cd -- tests/fixtures/real
          cargo hack check --feature-powerset --workspace
          cargo hack check --feature-powerset --workspace --message-format=json
          cd -- ../rust-version
          rustup toolchain remove 1.63 1.64 1.65
          cargo hack check --rust-version --workspace --locked
          cargo uninstall cargo-hack
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2.77.4
        with:
          tool: cargo-hack,cargo-minimal-versions
          fallback: none
      - run: cargo hack build --workspace --no-private --feature-powerset --no-dev-deps
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features --direct

  test-compat:
    name: test (1.${{ matrix.rust }})
    needs: tidy
    strategy:
      fail-fast: false
      matrix:
        rust:
          # cargo-hack is usually runnable with Cargo versions older than the Rust version required for installation.
          # When updating this, the reminder to update the minimum supported Rust version in README.md.
          - 26
          - 30
          - 31
          - 36
          - 39
          - 41
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2.77.4
        with:
          tool: rust@nightly
          fallback: none
      - run: cargo test --workspace --all-features
        env:
          CARGO_HACK_TEST_TOOLCHAIN: ${{ matrix.rust }}
      # Remove stable toolchain to disable https://github.com/taiki-e/cargo-hack/pull/138's behavior.
      - run: rustup toolchain remove stable
      - run: cargo test --workspace --all-features
        env:
          CARGO_HACK_TEST_TOOLCHAIN: ${{ matrix.rust }}

  test-no-rustup:
    name: test (no rustup)
    needs: tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    container: alpine
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Install Rust
        run: apk --no-cache add cargo
      - run: cargo test --workspace --all-features
      - run: |
          cargo install --path . --debug
          cd -- tests/fixtures/real
          cargo hack check --feature-powerset --workspace
          cargo uninstall cargo-hack
